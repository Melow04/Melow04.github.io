<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
        font-size: 25px;
        letter-spacing: 0.5px;
      }
      table {
        margin-left: auto;
        margin-right: auto;
        margin-top: 100px;
      }

      tr:nth-child(4n + 3) {
        background-color: rgb(185, 182, 182);
      }
      tr:nth-child(4n + 4) {
        background-color: rgb(185, 182, 182);
      }

      table,
      th {
        border: 1px solid;
        text-align: center;
        padding: 10px;
        border-collapse: collapse;
      }

      td {
        padding-left: 5px;
        padding-right: 5px;
        border: 1px solid;
      }

      .shoes {
        height: 400px;
      }

      .categories {
        background-color: rgb(244, 244, 114);
      }
    </style>
    <title>Inventory System</title>
  </head>

  <body>
    <table>
      <thead>
        <tr>
          <th colspan="7" style="background-color: rgb(78, 180, 228)">
            Inventory System
          </th>
        </tr>
        <tr class="categories">
          <th>ID</th>
          <th>Name/Color</th>
          <th>Quantity</th>
          <th>Supplier</th>
          <th>Date</th>
          <th>Image</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>001</td>
          <td>AE1/Red</td>
          <td style="color: red;">300</td>
          <td
            rowspan="8"
            style="background-color: aquamarine; font-weight: 600"
          >
            Adidas
          </td>
          <td rowspan="2">15/05/24</td>
          <td rowspan="8">
            <img
              src="https://assets.adidas.com/images/w_600,f_auto,q_auto/86a91d8a2b414cd4afbccb58fbc87bdc_9366/AE_1_Best_of_adi_Basketball_Shoes_Kids_White_IF1875_01_standard.jpg"
              class="shoes"
              alt="ae1shoes"
            />
          </td>
        </tr>
        <tr>
          <td>002</td>
          <td>AE1/Blue</td>
          <td>570</td>
        </tr>
        <tr>
          <td>003</td>
          <td>AE1/Peach</td>
          <td>1000</td>
          <td rowspan="2">15/06/24</td>
        </tr>
        <tr>
          <td>004</td>
          <td>AE1/White</td>
          <td>480</td>
        </tr>
        <tr>
          <td>005</td>
          <td>AE1/Green</td>
          <td>634</td>
          <td rowspan="2">15/05/24</td>
        </tr>
        <tr>
          <td>006</td>
          <td>AE1/Orange</td>
          <td>1200</td>
        </tr>
        <tr>
          <td>007</td>
          <td>AE1/Black</td>
          <td>753</td>
          <td rowspan="2">15/09/24</td>
        </tr>
        <tr>
          <td>008</td>
          <td>AE1/Pink</td>
          <td>620</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
