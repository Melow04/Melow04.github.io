<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/regform.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="assets/regvalidation.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <title>Registration</title>
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col col-md-4 regform">
          <h1>Registration Form</h1>
          <hr>
          <form action="" method="post">
            <div class="col col-md-12 mb-4">
              <label for="firstname" class="form-label">First Name</label>
              <input type="text" class="form-control" name="firstname" id="firstname" />
            </div>
            <div class="col col-md-12 mb-4">
                <label for="lastname" class="form-label">Last Name</label>
                <input type="text" class="form-control" name="lastname" id="lastname" />
              </div>
              <div class="col col-md-12 mb-4">
                <label for="fullname" class="form-label">Full Name</label>
                <input type="text" class="form-control" name="fullname" id="fullname" readonly/>
              </div>
        
            <div class="col col-md-12 mb-4">
              <label for="email" class="form-label">Email</label>
              <input type="text" class="form-control" name="email" id="email" />
            </div>
            <div class="col col-md-12 mb-4">
                <label for="birthday" class="form-label">Birthdate</label>
                <input type="date" class="form-control" name="birthday" id="birthday" />
              </div>
            <div class="col col-md-12 mb-4">
              <label for="password" class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                name="password"
                id="password"
              />
            </div>
            <div class="col col-md-12 mb-4">
              <label for="confpassword" class="form-label"
                >Confirm Password</label
              >
              <input
                type="password"
                class="form-control"
                name="confpassword"
                id="confpassword"
              />
            </div>
            <div>
                <button type="button" name="submit" id="submit" class="btn btn-primary" value="Redirect Me" onclick="submitToPage();">Register</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script type="text/javascript" src="assets/regvalidation.js"></script>
  </body>
</html>
